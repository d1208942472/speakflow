name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-api:
    name: API Tests (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.TEST_SUPABASE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIn0.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c' }}
          NVIDIA_API_KEY: test-key
          NVIDIA_NIM_API_KEY: test-key

  lint-web:
    name: Web Build Check (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          STRIPE_SECRET_KEY: sk_test_placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          STRIPE_ANNUAL_PRICE_ID: price_placeholder
          NEXT_PUBLIC_API_URL: https://api.speakmeteor.win
          NEXT_PUBLIC_SITE_URL: https://speakmeteor.win
          NEXT_PUBLIC_CANONICAL_SITE_URL: https://speakmeteor.win
          NEXT_PUBLIC_WEB_CHECKOUT_ENABLED: "false"

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          STRIPE_SECRET_KEY: sk_test_placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          STRIPE_ANNUAL_PRICE_ID: price_placeholder
          NEXT_PUBLIC_API_URL: https://api.speakmeteor.win
          NEXT_PUBLIC_SITE_URL: https://speakmeteor.win
          NEXT_PUBLIC_CANONICAL_SITE_URL: https://speakmeteor.win
          NEXT_PUBLIC_WEB_CHECKOUT_ENABLED: "false"
